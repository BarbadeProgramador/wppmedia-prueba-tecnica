<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity DCO - WPP Media Assessment</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="adBanner" class="weather-banner">
        <div id="weatherEffects" class="weather-effects"></div>
        
        <div class="bg-text-container">
            <span class="bg-text-stroke">RUN</span>
        </div>

        <div class="header-overlay">
            <div class="brand-logo">RUNNERS</div>
            <div class="weather-widget">
                <div class="city-name" id="cityName">Cargando...</div>
                <div class="temp-row">
                    <span id="weatherIcon" class="w-icon"></span>
                    <span class="temperature" id="temperature">--°</span>
                    <span class="condition" id="condition">...</span>
                </div>
            </div>
        </div>

        <div class="product-showcase">
            <img id="shoeImage" src="" alt="Running Shoe" class="shoe-img">
            <div class="shoe-shadow"></div>
        </div>

        <div class="footer-overlay">
            <div class="ad-copy">
                <p id="shoeModel" class="shoe-model-name"></p>
                <h2 id="headline">EQUÍPATE</h2>
                <p id="subheadline">Rendimiento adaptado a tu clima.</p>
            </div>
            <button class="cta-btn">COMPRAR AHORA</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
