<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverGreen Premium Billboard | DCO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
</head>
<body>

    <div id="adBanner" class="garden-banner-billboard">
        <div class="tech-bar">
            <span class="status-dot"></span>
            <span class="tech-label">CONEXION: <span class="highlight">API VIA - mockAPI.io</span></span>
        </div>

        <div class="glow-effect"></div>
        
        <div class="content-wrapper">
            <div class="info-section">
                <div class="brand-badge">JARDINERIA AI</div>
                <p id="productType" class="product-tag">INNOVACIÓN URBANA</p>
                
                <h2 id="headline">CARGANDO...</h2>
                
                <div class="description-container">
                    <p id="subheadline" class="subheadline">Sincronizando el catálogo inteligente...</p>
                </div>
                
                <div class="action-row">
                    <button id="ctaButton" class="cta-btn-billboard">ADQUIRIR AHORA</button>
                    <div class="weather-pill">
                        <span id="cityName">BOGOTÁ</span> | <span id="temperature">--°</span>
                    </div>
                </div>
            </div>

            <div class="product-showcase-billboard">
                <div class="bg-text-back">TECH</div>
                <img id="productImage" src="" alt="Producto" class="main-img-billboard">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
