<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverGreen Dynamic Banner | WPP Assessment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="adBanner" class="garden-banner">
        
        <div id="weatherEffects" class="weather-effects"></div>

        <div class="bg-text-container">
            <span class="bg-text-stroke">GROW</span>
        </div>

        <div class="header-overlay">
            <div class="brand-logo">EVERGREEN</div>
            <div class="weather-widget">
                <div class="city-name" id="cityName">UBICACIÓN</div>
                <div class="temp-row">
                    <span id="weatherIcon" class="w-icon">🌱</span>
                    <span class="temperature" id="temperature">--°</span>
                    <span class="condition" id="condition">DCO ACTIVE</span>
                </div>
            </div>
        </div>

        <div class="product-showcase">
            <img id="productImage" src="" alt="Producto EverGreen" class="main-img">
            <div class="shadow-effect"></div>
        </div>

        <div class="footer-overlay">
            <div class="ad-copy">
                <p id="productType" class="product-tag"></p>
                <h2 id="headline">CARGANDO...</h2>
                <p id="subheadline">Sincronizando con el catálogo de IA...</p>
            </div>
            <button id="ctaButton" class="cta-btn">DESCUBRIR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
